<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المراجعة الاحترافي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="selection-screen">
            <h1>اختيار الموديل</h1>
            <div class="form-group"><select id="sem-select"><option value="">اختر الفصل...</option></select></div>
            <div class="form-group" id="path-container" style="display:none;"><select id="path-select"><option value="">اختر المسار...</option></select></div>
            <div class="form-group"><select id="mod-select"><option value="">اختر الموديل...</option></select></div>
            <button id="start-btn">ابدأ المراجعة</button>
            
            <div class="nav-footer">
                <button onclick="location.reload()">🏠 القائمة</button>
                <button onclick="window.close()">🚪 خروج</button>
            </div>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div id="stats-header">
                <div id="timer-display">الوقت: 10</div>
                <div id="score-display">النقاط: 0</div>
            </div>
            <h2 id="question">السؤال هنا</h2>
            <div id="options"></div>

            <div class="nav-footer">
                <button onclick="location.reload()">🏠 القائمة</button>
                <button onclick="location.reload()">⬅️ الرجوع</button>
                <button onclick="window.close()">🚪 خروج</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
